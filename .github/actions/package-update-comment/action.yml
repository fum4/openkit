name: Package (Update Comment)
description: Update an existing PR package status comment.

inputs:
  comment-id:
    description: Numeric issue comment id to update.
    required: true
  command:
    description: Slash command that triggered packaging.
    required: true
  logs-url:
    description: URL to the current workflow run logs.
    required: true
  mode:
    description: "Comment mode: progress or final."
    required: true
  build-mac:
    description: Whether macOS packaging was requested (true/false).
    required: true
  build-linux:
    description: Whether Linux packaging was requested (true/false).
    required: true
  mac-running:
    description: Whether macOS packaging is currently running (true/false).
    required: false
    default: "false"
  linux-running:
    description: Whether Linux packaging is currently running (true/false).
    required: false
    default: "false"
  mac-result:
    description: macOS job result (success/failure/cancelled/skipped). Leave empty while running.
    required: false
    default: ""
  linux-result:
    description: Linux job result (success/failure/cancelled/skipped). Leave empty while running.
    required: false
    default: ""
  mac-arm-artifact-url:
    description: Artifact URL for macOS Apple Silicon package upload.
    required: false
    default: ""
  mac-intel-artifact-url:
    description: Artifact URL for macOS Intel package upload.
    required: false
    default: ""
  linux-artifact-url:
    description: Artifact URL for Linux package.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/github-script@v7
      env:
        COMMENT_ID: ${{ inputs.comment-id }}
        COMMAND: ${{ inputs.command }}
        LOGS_URL: ${{ inputs.logs-url }}
        MODE: ${{ inputs.mode }}
        BUILD_MAC: ${{ inputs.build-mac }}
        BUILD_LINUX: ${{ inputs.build-linux }}
        MAC_RESULT: ${{ inputs.mac-result }}
        LINUX_RESULT: ${{ inputs.linux-result }}
        MAC_ARM_ARTIFACT_URL: ${{ inputs.mac-arm-artifact-url }}
        MAC_INTEL_ARTIFACT_URL: ${{ inputs.mac-intel-artifact-url }}
        LINUX_ARTIFACT_URL: ${{ inputs.linux-artifact-url }}
        MAC_RUNNING: ${{ inputs.mac-running }}
        LINUX_RUNNING: ${{ inputs.linux-running }}
      with:
        script: |
          const statusIcon = {
            success: "📦",
            failure: "❌",
            cancelled: "🚫",
            skipped: "⚠️",
          };
          const statusLabel = {
            success: "Success",
            failure: "Failed",
            cancelled: "Canceled",
            skipped: "Skipped",
          };

          const mode = process.env.MODE;
          const buildMac = process.env.BUILD_MAC === "true";
          const buildLinux = process.env.BUILD_LINUX === "true";

          const parseExistingRows = (body) => {
            const parsed = new Map();
            if (!body) return parsed;

            const lines = body.split("\n");
            for (const rawLine of lines) {
              const line = rawLine.trim();
              if (!line.startsWith("|")) continue;
              const cells = line.split("|").map((part) => part.trim()).filter(Boolean);
              if (cells.length < 2) continue;

              const [target, statusCell, artifactCell] = cells;
              if (
                target === "Target" ||
                target === "---" ||
                !["macOS (Apple Silicon)", "macOS (Intel)", "Linux"].includes(target)
              ) {
                continue;
              }

              const lower = statusCell.toLowerCase();
              let result = "";
              let running = false;

              if (lower.includes("in progress")) running = true;
              else if (lower.includes("queued")) {
                // Keep defaults (queued means no result and not running).
              } else if (lower.includes("success")) result = "success";
              else if (lower.includes("failed")) result = "failure";
              else if (lower.includes("cancelled")) result = "cancelled";
              else if (lower.includes("skipped")) result = "skipped";

              parsed.set(target, {
                result,
                running,
                artifact: artifactCell ?? "",
              });
            }

            return parsed;
          };

          const rowFor = (name, result, running, artifactValue) => {
            if (!result) {
              return `| ${name} | ${running ? "⚙️ In Progress" : "⏳ Queued"} | — |`;
            }
            const normalized = statusIcon[result] ? result : "skipped";
            const icon = statusIcon[normalized];
            const label = statusLabel[normalized];
            const artifact =
              normalized === "success"
                ? artifactValue || "Available in run artifacts"
                : "—";
            return `| ${name} | ${icon} ${label} | ${artifact} |`;
          };

          const macResult = process.env.MAC_RESULT || "";
          const linuxResult = process.env.LINUX_RESULT || "";
          const macRunning = process.env.MAC_RUNNING === "true";
          const linuxRunning = process.env.LINUX_RUNNING === "true";
          const macArmArtifact = process.env.MAC_ARM_ARTIFACT_URL || "";
          const macIntelArtifact = process.env.MAC_INTEL_ARTIFACT_URL || "";
          const linuxArtifact = process.env.LINUX_ARTIFACT_URL || "";

          const { data: currentComment } = await github.rest.issues.getComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            comment_id: Number(process.env.COMMENT_ID),
          });

          const existingRows = parseExistingRows(currentComment.body || "");
          const existingMacArm = existingRows.get("macOS (Apple Silicon)") ?? {};
          const existingMacIntel = existingRows.get("macOS (Intel)") ?? {};
          const existingLinux = existingRows.get("Linux") ?? {};

          const resolveTargetState = ({
            inputResult,
            inputRunning,
            inputArtifact,
            existing,
          }) => {
            if (mode === "final") {
              return {
                result: inputResult,
                running: false,
                artifact: inputArtifact || existing.artifact || "",
              };
            }

            if (inputResult) {
              return {
                result: inputResult,
                running: false,
                artifact: inputArtifact || existing.artifact || "",
              };
            }

            if (inputRunning) {
              return {
                result: "",
                running: true,
                artifact: "",
              };
            }

            return {
              result: existing.result || "",
              running: existing.running === true,
              artifact: existing.artifact || "",
            };
          };

          const macArmState = resolveTargetState({
            inputResult: macResult,
            inputRunning: macRunning,
            inputArtifact: macArmArtifact ? `[Download](${macArmArtifact})` : "",
            existing: existingMacArm,
          });
          const macIntelState = resolveTargetState({
            inputResult: macResult,
            inputRunning: macRunning,
            inputArtifact: macIntelArtifact ? `[Download](${macIntelArtifact})` : "",
            existing: existingMacIntel,
          });
          const linuxState = resolveTargetState({
            inputResult: linuxResult,
            inputRunning: linuxRunning,
            inputArtifact: linuxArtifact ? `[Download](${linuxArtifact})` : "",
            existing: existingLinux,
          });

          const rows = [];
          if (buildMac) {
            rows.push(
              rowFor(
                "macOS (Apple Silicon)",
                macArmState.result,
                macArmState.running,
                macArmState.artifact
              )
            );
            rows.push(
              rowFor(
                "macOS (Intel)",
                macIntelState.result,
                macIntelState.running,
                macIntelState.artifact
              )
            );
          }
          if (buildLinux)
            rows.push(
              rowFor(
                "Linux",
                linuxState.result,
                linuxState.running,
                linuxState.artifact
              )
            );

          let title = "### ⚙️ Packaging in progress";
          if (mode === "final") {
            const finalResults = [];
            if (buildMac) finalResults.push(macResult || "skipped");
            if (buildLinux) finalResults.push(linuxResult || "skipped");

            title = "### ℹ️ Packaging finished";
            const allCancelled =
              finalResults.length > 0 && finalResults.every((result) => result === "cancelled");
            const nonCancelledResults = finalResults.filter((result) => result !== "cancelled");

            if (allCancelled) {
              title = "### 🚫 Packaging canceled";
            } else if (nonCancelledResults.length > 0) {
              const first = nonCancelledResults[0];
              const allSame = nonCancelledResults.every((result) => result === first);

              if (allSame) {
                if (first === "success") title = "### 📦 Packaging completed";
                else if (first === "failure") title = "### ❌ Packaging failed";
                else if (first === "skipped") title = "### ⚠️ Packaging skipped";
                else title = "### ℹ️ Packaging finished";
              } else {
                title = "### ⚠️ Packaging completed with issues";
              }
            }
          }

          const body = `${title}\nTriggered by @${context.actor} with \`${process.env.COMMAND}\`\n\n[View workflow logs](${process.env.LOGS_URL})\n\n| Target | Status | Artifact |\n| --- | --- | --- |\n${rows.join("\n")}`;

          await github.rest.issues.updateComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            comment_id: Number(process.env.COMMENT_ID),
            body,
          });
