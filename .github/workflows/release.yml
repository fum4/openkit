name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-affected:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release-gate.outputs.should_release }}

    steps:
      - name: Check release commit
        id: release-commit-check
        shell: bash
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          is_release_commit="false"
          if [[ "${HEAD_COMMIT_MESSAGE}" == "🔖 release:"* ]]; then
            is_release_commit="true"
          fi

          echo "is_release_commit=${is_release_commit}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: steps.release-commit-check.outputs.is_release_commit != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup workspace
        if: steps.release-commit-check.outputs.is_release_commit != 'true'
        uses: ./.github/actions/setup-deps
        with:
          deps: pnpm,node

      - name: Resolve comparison SHAs
        if: steps.release-commit-check.outputs.is_release_commit != 'true'
        id: comparison
        shell: bash
        env:
          PUSH_BASE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          base_sha="${PUSH_BASE_SHA}"
          if [[ -z "${base_sha}" || "${base_sha}" == "0000000000000000000000000000000000000000" ]]; then
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              base_sha="$(git rev-parse HEAD^)"
            else
              base_sha="${PUSH_HEAD_SHA}"
            fi
          fi

          echo "base_sha=${base_sha}" >> "${GITHUB_OUTPUT}"
          echo "head_sha=${PUSH_HEAD_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Detect desktop packaging impact
        if: steps.release-commit-check.outputs.is_release_commit != 'true'
        id: desktop-package-impact
        uses: ./.github/actions/check-affected-target
        with:
          base-sha: ${{ steps.comparison.outputs.base_sha }}
          head-sha: ${{ steps.comparison.outputs.head_sha }}
          targets: package
          project-type: app
          include-projects: desktop-app

      - name: Resolve release gate
        id: release-gate
        shell: bash
        env:
          IS_RELEASE_COMMIT: ${{ steps.release-commit-check.outputs.is_release_commit }}
          DESKTOP_PACKAGE_AFFECTED: ${{ steps.desktop-package-impact.outputs.affected }}
        run: |
          set -euo pipefail

          should_release="false"
          if [[ "${IS_RELEASE_COMMIT}" == "false" && "${DESKTOP_PACKAGE_AFFECTED}" == "true" ]]; then
            should_release="true"
          fi

          echo "should_release=${should_release}" >> "${GITHUB_OUTPUT}"

  publish:
    needs: check-affected
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: needs.check-affected.outputs.should_release == 'true'
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_PAT }}

      - name: Setup workspace
        uses: ./.github/actions/setup-deps
        with:
          deps: pnpm,node

      - name: Release verification
        run: pnpm check:all

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        run: pnpm release-it --ci --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_PAT }}

      - name: Resolve release tag
        id: release_tag
        run: |
          set -euo pipefail
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ -z "$version" ]; then
            echo "Failed to resolve package version for release tag" >&2
            exit 1
          fi
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
