name: Test

on:
  pull_request:
    branches: [master]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-affected:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.set-outputs.outputs.cli }}
      server: ${{ steps.set-outputs.outputs.server }}
      web_app: ${{ steps.set-outputs.outputs.web_app }}
      desktop_app: ${{ steps.set-outputs.outputs.desktop_app }}
      shared: ${{ steps.set-outputs.outputs.shared }}
      port_offset: ${{ steps.set-outputs.outputs.port_offset }}
      e2e: ${{ steps.e2e-affected.outputs.affected }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-deps
        with:
          deps: pnpm,node
      - id: test-affected
        uses: ./.github/actions/check-affected-target
        with:
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          targets: test:unit
      - id: e2e-affected
        uses: ./.github/actions/check-affected-target
        with:
          base-sha: ${{ github.event.pull_request.base.sha }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          targets: test:e2e
      - id: set-outputs
        shell: bash
        env:
          TEST_PROJECTS: ${{ steps.test-affected.outputs.projects }}
        run: |
          set -euo pipefail

          for project in cli server web-app desktop-app shared port-offset; do
            key="${project//-/_}"
            if [[ ",${TEST_PROJECTS}," == *",${project},"* ]]; then
              echo "${key}=true" >> "${GITHUB_OUTPUT}"
            else
              echo "${key}=false" >> "${GITHUB_OUTPUT}"
            fi
          done

  smoke-cli:
    needs: check-affected
    if: needs.check-affected.outputs.cli == 'true'
    name: cli (smoke) (${{ matrix.os_name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: Linux
            runner: ubuntu-latest
            port: 6979
            log_file: /tmp/OpenKit-linux-smoke.log
          - os_name: macOS
            runner: macos-latest
            port: 6989
            log_file: /tmp/OpenKit-macos-smoke.log

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-deps
        with:
          deps: pnpm,node,go,tinygo,zig
      - run: pnpm run build:cli && pnpm run build:server
      - name: Smoke test CLI startup
        run: |
          set -euo pipefail
          export OPENKIT_NO_OPEN=1
          export OPENKIT_AUTO_INIT=1
          export OPENKIT_SERVER_PORT=${{ matrix.port }}

          node apps/cli/dist/cli/index.js --no-open > "${{ matrix.log_file }}" 2>&1 &
          OPENKIT_PID=$!

          cleanup() {
            kill "$OPENKIT_PID" 2>/dev/null || true
            wait "$OPENKIT_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for i in $(seq 1 60); do
            if ! kill -0 "$OPENKIT_PID" 2>/dev/null; then
              echo "OpenKit process exited before startup completed"
              cat "${{ matrix.log_file }}" || true
              exit 1
            fi

            if curl --silent --fail "http://127.0.0.1:${OPENKIT_SERVER_PORT}/api/config" >/dev/null; then
              exit 0
            fi

            sleep 1
          done

          echo "OpenKit failed to become ready within timeout"
          cat "${{ matrix.log_file }}" || true
          exit 1

  unit-cli:
    needs: check-affected
    if: needs.check-affected.outputs.cli == 'true'
    name: cli (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-deps
        with:
          deps: pnpm,node
      - run: pnpm nx run cli:test:unit:coverage

  unit-server:
    needs: check-affected
    if: needs.check-affected.outputs.server == 'true'
    name: server (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-deps
        with:
          deps: pnpm,node
      - run: pnpm nx run server:test:unit:coverage

  # web-app needs go,tinygo because it imports @openkit/logger/browser (WASM),
  # which requires the logger build. Other packages use the Node FFI logger
  # that degrades gracefully without the native build.
  unit-web-app:
    needs: check-affected
    if: needs.check-affected.outputs.web_app == 'true'
    name: web-app (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-deps
        with:
          deps: pnpm,node,go,tinygo
      - run: pnpm nx run web-app:test:unit:coverage

  unit-shared:
    needs: check-affected
    if: needs.check-affected.outputs.shared == 'true'
    name: shared (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-deps
        with:
          deps: pnpm,node
      - run: pnpm nx run shared:test:unit:coverage

  unit-desktop-app:
    needs: check-affected
    if: needs.check-affected.outputs.desktop_app == 'true'
    name: desktop-app (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-deps
        with:
          deps: pnpm,node
      - run: pnpm nx run desktop-app:test:unit:coverage

  unit-port-offset:
    needs: check-affected
    if: needs.check-affected.outputs.port_offset == 'true'
    name: port-offset (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-deps
        with:
          deps: pnpm,node
      - run: pnpm nx run port-offset:test:unit:coverage

  e2e:
    needs: check-affected
    if: needs.check-affected.outputs.e2e == 'true'
    name: e2e
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-deps
        with:
          deps: pnpm,node,go,tinygo,zig
      - run: pnpm nx run e2e:test:e2e
