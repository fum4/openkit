# Auth setup:
#   1. Run `claude setup-token` locally (requires Claude subscription)
#   2. Copy the generated OAuth token (valid for 1 year)
#   3. Store it: gh secret set CLAUDE_CODE_OAUTH_TOKEN
#
# To rotate: repeat the steps above. The old token is invalidated.

name: Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  REVIEW_TITLE: '## <img src="https://raw.githubusercontent.com/lobehub/lobe-icons/refs/heads/master/packages/static-png/light/claude-color.png" width="20" height="20" align="absmiddle" /> Clode Review'

jobs:
  claude-pr-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin marketplace add anthropics/claude-plugins-official
          claude plugin install code-review@claude-plugins-official

      - name: Find previous review
        id: previous
        uses: actions/github-script@v7
        with:
          script: |
            const title = process.env.REVIEW_TITLE;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const review = comments.data.find(c => c.body.startsWith(title));
            if (review) {
              core.setOutput('comment_id', review.id);
              const body = review.body.replace(title, '').trim();
              require('fs').writeFileSync('/tmp/previous-review.txt', body);
              core.setOutput('found', 'true');
            } else {
              core.setOutput('found', 'false');
            }

      - name: Review code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HAS_PREVIOUS: ${{ steps.previous.outputs.found }}
          REVIEW_PROMPT: |
            You have the code-review plugin installed. Use it to review this pull request diff (provided via stdin).

            After reviewing, format your output as follows:

            ### 🔴 Major
            Issues that must be fixed — bugs, security vulnerabilities, data loss risks, broken logic.

            ### 🟠 Medium
            Issues that should be fixed — performance problems, error handling gaps, code smells, maintainability concerns.

            ### 🟡 Minor
            Suggestions for improvement — style, naming, documentation, minor simplifications.

            ### 🟢 Resolved
            Issues from previous reviews that have been fixed. Keep all resolved issues from every prior review — never remove resolved items, even after multiple re-reviews. This section serves as a cumulative record of addressed feedback.

            Only include categories that have findings — omit any category with nothing to report.
            Be concise and actionable. Reference file paths and line numbers where applicable.
        run: |
          git diff "origin/$BASE_REF"...HEAD > /tmp/pr-diff.txt

          printf '%s' "$REVIEW_PROMPT" > /tmp/prompt.txt
          if [ "$HAS_PREVIOUS" = "true" ]; then
            printf '\nHere is your previous review for reference. Use it to track whether earlier issues have been addressed. Move fixed issues to the "🟢 Resolved" section — never delete resolved items from prior reviews, accumulate them across all re-reviews:\n\n<previous-review>\n' >> /tmp/prompt.txt
            cat /tmp/previous-review.txt >> /tmp/prompt.txt
            printf '\n</previous-review>' >> /tmp/prompt.txt
          fi

          cat /tmp/pr-diff.txt | claude --print \
            --model claude-opus-4-6 \
            --max-turns 1 \
            "$(cat /tmp/prompt.txt)" \
            > /tmp/review-output.txt

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = process.env.REVIEW_TITLE;
            const commentId = '${{ steps.previous.outputs.comment_id }}';

            let review = '';
            try {
              review = fs.readFileSync('/tmp/review-output.txt', 'utf8').trim();
            } catch (e) {
              review = '⚠️ Code review failed to produce output. Check the workflow logs.';
            }
            if (!review) {
              review = '⚠️ Code review produced empty output. Check the workflow logs.';
            }

            const body = `${title}\n\n${review}`;

            if (commentId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: Number(commentId),
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
