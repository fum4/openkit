# Auth setup:
#   1. Run `claude setup-token` locally (requires Claude subscription)
#   2. Copy the generated OAuth token (valid for 1 year)
#   3. Store it: gh secret set CLAUDE_CODE_OAUTH_TOKEN
#
# To rotate: repeat the steps above. The old token is invalidated.

name: Code Review

on:
  pull_request:
    types: [opened, synchronize]

env:
  REVIEW_TITLE: "## 🧐 Code Review"

jobs:
  claude-pr-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npm install -g @anthropic-ai/claude-code
          echo "::group::Claude version"
          claude --version
          echo "::endgroup::"
          echo "::group::Marketplace list (before)"
          claude plugin marketplace list || true
          echo "::endgroup::"
          echo "::group::Add marketplace"
          claude plugin marketplace add anthropics/claude-plugins-official
          echo "::endgroup::"
          echo "::group::Marketplace list (after)"
          claude plugin marketplace list
          echo "::endgroup::"
          echo "::group::Install code-review plugin"
          claude plugin install code-review@claude-plugins-official
          echo "::endgroup::"
          echo "::group::Installed plugins"
          claude plugin list
          echo "::endgroup::"

      - name: Find previous review
        id: previous
        uses: actions/github-script@v7
        with:
          script: |
            const title = process.env.REVIEW_TITLE;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const review = comments.data.find(c => c.body.startsWith(title));
            if (review) {
              core.setOutput('comment_id', review.id);
              const body = review.body.replace(title, '').trim();
              require('fs').writeFileSync('/tmp/previous-review.txt', body);
              core.setOutput('found', 'true');
            } else {
              core.setOutput('found', 'false');
            }

      - name: Review code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HAS_PREVIOUS: ${{ steps.previous.outputs.found }}
          REVIEW_PROMPT: |
            You have the code-review plugin installed. Use it to review this pull request diff (provided via stdin).

            After reviewing, format your output as follows:

            ## 🔴 Major
            Issues that must be fixed — bugs, security vulnerabilities, data loss risks, broken logic.

            ## 🟠 Medium
            Issues that should be fixed — performance problems, error handling gaps, code smells, maintainability concerns.

            ## 🟡 Minor
            Suggestions for improvement — style, naming, documentation, minor simplifications.

            If a category has no findings, write 'None.' under it.
            Be concise and actionable. Reference file paths and line numbers where applicable.
        run: |
          git diff "origin/$BASE_REF"...HEAD > /tmp/pr-diff.txt

          PROMPT="$REVIEW_PROMPT"
          if [ "$HAS_PREVIOUS" = "true" ]; then
            PREVIOUS=$(cat /tmp/previous-review.txt)
            PROMPT="$PROMPT

          Here is your previous review for reference. Use it to track whether earlier issues have been addressed, and note any that are now resolved or still present:

          <previous-review>
          $PREVIOUS
          </previous-review>"
          fi

          cat /tmp/pr-diff.txt | claude --print \
            --model claude-opus-4-6 \
            --max-turns 10 \
            --permission-mode bypassPermissions \
            "$PROMPT" \
            > /tmp/review-output.txt

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = process.env.REVIEW_TITLE;
            const commentId = '${{ steps.previous.outputs.comment_id }}';

            let review = '';
            try {
              review = fs.readFileSync('/tmp/review-output.txt', 'utf8').trim();
            } catch (e) {
              review = '⚠️ Code review failed to produce output. Check the workflow logs.';
            }
            if (!review) {
              review = '⚠️ Code review produced empty output. Check the workflow logs.';
            }

            const body = `${title}\n\n${review}`;

            if (commentId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: Number(commentId),
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
