name: Package (Release)

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-assets-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Build desktop artifacts (signed/notarized)
        uses: ./.github/actions/package-desktop-macos
        with:
          sign-and-notarize: "true"
          mac-certificate: ${{ secrets.MAC_CERTIFICATE }}
          mac-certificate-password: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          apple-id: ${{ secrets.APPLE_ID }}
          apple-team-id: ${{ secrets.APPLE_TEAM_ID }}
          apple-app-specific-password: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            apps/desktop-app/release/*.dmg
            apps/desktop-app/release/*.dmg.blockmap

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Build desktop artifacts
        run: pnpm package:desktop:linux

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            apps/desktop-app/release/*.AppImage
