name: Package (Pull Request)

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-package-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  notify-package-start:
    if: ${{ github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      should_run: ${{ steps.parse-command.outputs.should_run }}
      command: ${{ steps.parse-command.outputs.command }}
      build_mac: ${{ steps.parse-command.outputs.build_mac }}
      build_linux: ${{ steps.parse-command.outputs.build_linux }}
      sign_mac: ${{ steps.resolve-signing.outputs.sign_mac }}
      comment_id: ${{ steps.create-status-comment.outputs.result }}
    steps:
      - name: Parse slash command
        id: parse-command
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
        run: |
          set -euo pipefail

          first_line="$(printf '%s\n' "$COMMENT_BODY" | head -n1 | tr -d '\r' | xargs)"

          should_run=false
          build_mac=false
          build_linux=false
          command=""

          if [[ "$AUTHOR_ASSOCIATION" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]]; then
          if [[ "$first_line" =~ ^/package($|[[:space:]]) ]]; then
            should_run=true
            build_mac=true
            build_linux=true
            command="/package"
          elif [[ "$first_line" =~ ^/package:mac($|[[:space:]]) ]]; then
            should_run=true
            build_mac=true
            build_linux=false
            command="/package:mac"
          elif [[ "$first_line" =~ ^/package:linux($|[[:space:]]) ]]; then
            should_run=true
            build_mac=false
            build_linux=true
            command="/package:linux"
          fi
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "build_mac=$build_mac" >> "$GITHUB_OUTPUT"
          echo "build_linux=$build_linux" >> "$GITHUB_OUTPUT"
          echo "command=$command" >> "$GITHUB_OUTPUT"

      - name: Add reaction to triggering comment
        if: ${{ steps.parse-command.outputs.should_run == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              comment_id: context.payload.comment.id,
              owner: context.repo.owner,
              repo: context.repo.repo,
              content: "+1",
            });

      - name: Resolve PR head repository
        if: ${{ steps.parse-command.outputs.should_run == 'true' }}
        id: pr-head
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const isSameRepository = pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
            core.setOutput("is_same_repository", isSameRepository ? "true" : "false");

      - name: Resolve mac signing mode
        if: ${{ steps.parse-command.outputs.should_run == 'true' }}
        id: resolve-signing
        shell: bash
        env:
          BUILD_MAC: ${{ steps.parse-command.outputs.build_mac }}
          IS_SAME_REPOSITORY: ${{ steps.pr-head.outputs.is_same_repository }}
        run: |
          set -euo pipefail
          sign_mac=false
          if [[ "$BUILD_MAC" == "true" && "$IS_SAME_REPOSITORY" == "true" ]]; then
            sign_mac=true
          fi
          echo "sign_mac=$sign_mac" >> "$GITHUB_OUTPUT"

      - name: Create status comment
        if: ${{ steps.parse-command.outputs.should_run == 'true' }}
        id: create-status-comment
        uses: actions/github-script@v7
        with:
          script: |
            const logsUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const command = "${{ steps.parse-command.outputs.command }}";
            const targets = [];
            if ("${{ steps.parse-command.outputs.build_mac }}" === "true") {
              targets.push("macOS (Apple Silicon)");
              targets.push("macOS (Intel)");
            }
            if ("${{ steps.parse-command.outputs.build_linux }}" === "true") targets.push("Linux");

            const rows = targets.map((target) => `| ${target} | ⏳ Queued |`).join("\n");
            const body = `### ⏳ Packaging queued\nTriggered by @${context.payload.comment.user.login} with \`${command}\`\n\n[View workflow logs](${logsUrl})\n\n| Target | Status |\n| --- | --- |\n${rows}`;

            const comment = await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

            return comment.data.id;

  notify-package-in-progress:
    needs: notify-package-start
    if: ${{ needs.notify-package-start.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Update status comment (set in-progress targets)
        uses: ./.github/actions/package-update-comment
        with:
          comment-id: ${{ needs.notify-package-start.outputs.comment_id }}
          command: ${{ needs.notify-package-start.outputs.command }}
          logs-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          mode: progress
          build-mac: ${{ needs.notify-package-start.outputs.build_mac }}
          build-linux: ${{ needs.notify-package-start.outputs.build_linux }}
          mac-running: ${{ needs.notify-package-start.outputs.build_mac }}
          linux-running: ${{ needs.notify-package-start.outputs.build_linux }}

  package-macos:
    needs:
      - notify-package-start
      - notify-package-in-progress
    if: ${{ needs.notify-package-start.outputs.should_run == 'true' && needs.notify-package-start.outputs.build_mac == 'true' }}
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
    outputs:
      arm_artifact_url: ${{ steps.upload_arm.outputs.artifact-url }}
      intel_artifact_url: ${{ steps.upload_intel.outputs.artifact-url }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Build desktop artifacts (macOS)
        uses: ./.github/actions/package-desktop-macos
        with:
          sign-and-notarize: ${{ needs.notify-package-start.outputs.sign_mac }}
          mac-certificate: ${{ needs.notify-package-start.outputs.sign_mac == 'true' && secrets.MAC_CERTIFICATE || '' }}
          mac-certificate-password: ${{ needs.notify-package-start.outputs.sign_mac == 'true' && secrets.MAC_CERTIFICATE_PASSWORD || '' }}
          apple-id: ${{ needs.notify-package-start.outputs.sign_mac == 'true' && secrets.APPLE_ID || '' }}
          apple-team-id: ${{ needs.notify-package-start.outputs.sign_mac == 'true' && secrets.APPLE_TEAM_ID || '' }}
          apple-app-specific-password: ${{ needs.notify-package-start.outputs.sign_mac == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}

      - name: Upload macOS artifacts (Apple Silicon)
        id: upload_arm
        uses: actions/upload-artifact@v4
        with:
          name: openkit-pr-${{ github.event.issue.number }}-macos-arm64
          path: |
            apps/desktop-app/release/*arm64.dmg
          if-no-files-found: error

      - name: Upload macOS artifacts (Intel)
        id: upload_intel
        uses: actions/upload-artifact@v4
        with:
          name: openkit-pr-${{ github.event.issue.number }}-macos-x64
          path: |
            apps/desktop-app/release/*x64.dmg
          if-no-files-found: error

  package-linux:
    needs:
      - notify-package-start
      - notify-package-in-progress
    if: ${{ needs.notify-package-start.outputs.should_run == 'true' && needs.notify-package-start.outputs.build_linux == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
    outputs:
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Setup pnpm + Node
        uses: ./.github/actions/setup-pnpm-node

      - name: Build desktop artifacts (Linux)
        run: pnpm package:linux

      - name: Upload Linux artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: openkit-pr-${{ github.event.issue.number }}-linux
          path: |
            apps/desktop-app/release/*.AppImage
          if-no-files-found: error

  notify-package-progress-macos:
    if: ${{ always() && needs.notify-package-start.outputs.should_run == 'true' && needs.notify-package-start.outputs.build_mac == 'true' }}
    needs:
      - notify-package-start
      - notify-package-in-progress
      - package-macos
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Update status comment (macOS)
        uses: ./.github/actions/package-update-comment
        with:
          comment-id: ${{ needs.notify-package-start.outputs.comment_id }}
          command: ${{ needs.notify-package-start.outputs.command }}
          logs-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          mode: progress
          build-mac: ${{ needs.notify-package-start.outputs.build_mac }}
          build-linux: ${{ needs.notify-package-start.outputs.build_linux }}
          mac-result: ${{ needs.package-macos.result }}
          mac-arm-artifact-url: ${{ needs.package-macos.outputs.arm_artifact_url }}
          mac-intel-artifact-url: ${{ needs.package-macos.outputs.intel_artifact_url }}

  notify-package-progress-linux:
    if: ${{ always() && needs.notify-package-start.outputs.should_run == 'true' && needs.notify-package-start.outputs.build_linux == 'true' }}
    needs:
      - notify-package-start
      - notify-package-in-progress
      - package-linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Update status comment (Linux)
        uses: ./.github/actions/package-update-comment
        with:
          comment-id: ${{ needs.notify-package-start.outputs.comment_id }}
          command: ${{ needs.notify-package-start.outputs.command }}
          logs-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          mode: progress
          build-mac: ${{ needs.notify-package-start.outputs.build_mac }}
          build-linux: ${{ needs.notify-package-start.outputs.build_linux }}
          linux-result: ${{ needs.package-linux.result }}
          linux-artifact-url: ${{ needs.package-linux.outputs.artifact_url }}

  notify-package-result:
    if: ${{ always() && needs.notify-package-start.outputs.should_run == 'true' }}
    needs:
      - notify-package-start
      - notify-package-in-progress
      - package-macos
      - package-linux
      - notify-package-progress-macos
      - notify-package-progress-linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Update status comment
        uses: ./.github/actions/package-update-comment
        with:
          comment-id: ${{ needs.notify-package-start.outputs.comment_id }}
          command: ${{ needs.notify-package-start.outputs.command }}
          logs-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          mode: final
          build-mac: ${{ needs.notify-package-start.outputs.build_mac }}
          build-linux: ${{ needs.notify-package-start.outputs.build_linux }}
          mac-result: ${{ needs.package-macos.result }}
          linux-result: ${{ needs.package-linux.result }}
          mac-arm-artifact-url: ${{ needs.package-macos.outputs.arm_artifact_url }}
          mac-intel-artifact-url: ${{ needs.package-macos.outputs.intel_artifact_url }}
          linux-artifact-url: ${{ needs.package-linux.outputs.artifact_url }}
