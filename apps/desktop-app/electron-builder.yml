appId: com.openkit.app
productName: OpenKit
publish:
  provider: generic
  url: https://github.com/fum4/openkit/releases/latest/download
directories:
  app: .
  output: release
files:
  - dist/**/*
  - assets/**/*
  - package.json
icon: assets/icon.icns
mac:
  icon: assets/icon.icns
  artifactName: "${productName}-${version}-${arch}.${ext}"
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  identity: "Developer ID Application"
linux:
  icon: assets/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
afterSign: ./electron-builder-notarize.cjs
asar: true
extraMetadata:
  main: dist/main.js
asarUnpack:
  - node_modules/node-pty/**
extraResources:
  - from: ../cli/dist
    to: cli
  - from: ../web-app/dist
    to: web
  - from: ../server/dist/runtime
    to: runtime
